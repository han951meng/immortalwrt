name: Compile Ruijie RG-X60 Pro Firmware

on:
  workflow_dispatch:  # 手动触发编译

jobs:
  compile:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source code
        uses: actions/checkout@main
        with:
          repository: hanwckf/immortalwrt-mt798x
          fetch-depth: 0

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure firmware (RG-X60 Pro + PassWall2 + 中文)
        run: |
          # 写入配置文件（适配 RG-X60 Pro）
          cat > .config << EOF
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_mediatek_filogic_DEVICE_ruijie_rg-x60-pro=y
          # 启用 LuCI 网页后台 + 中文
          CONFIG_LUCI=y
          CONFIG_LUCI_LANG_zh_CN=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          # 启用 PassWall2 + 中文
          CONFIG_PACKAGE_luci-app-passwall2=y
          CONFIG_PACKAGE_luci-i18n-passwall2-zh-cn=y
          # 启用 Xray 核心（PassWall2 依赖）
          CONFIG_PACKAGE_xray-core=y
          # 关闭无用功能，减小固件体积
          CONFIG_BUILD_LOG=y
          CONFIG_CCACHE=y
          EOF
          # 加载配置并下载依赖
          make defconfig
          make download -j$(nproc)
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile firmware
        run: |
          make -j$(nproc) V=s || make -j1 V=s  # 编译失败时单线程重试

      - name: Upload firmware
        uses: actions/upload-artifact@main
        with:
          name: Ruijie-RG-X60-Pro-Firmware
          path: bin/targets/mediatek/filogic/
